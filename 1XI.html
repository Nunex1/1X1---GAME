<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1XI — Monte seu XI. Dispute a liga.</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ===== TOKENS DE TEMA ===== */
:root, [data-theme="dark"]{
  --bg:#0F172A; --bg2:#1F2937; --nav-bg:#1F2937;
  --card:#1E293B; --card2:#252F3F;
  --line:#334155; --line2:#3f4d63; --row-line:#1b2533; --hover-line:#3f4d63;
  --txt:#F8FAFC; --txt2:#94A3B8; --txt3:#5d6b7e;
  --teal:#0F766E; --teal-hi:#14B8A6; --accent-contrast:#0f172a; --gold:#14B8A6;
  --field:#14352f; --field-grad:#16352e;
  --shirt-bg:#252F3F; --shirt-line:#3b4757; --shirt-num:#94A3B8;
  --hint-bg:#172033; --err-bg:#2a1618; --me-bg:#11302c;
  --overlay:rgba(2,6,18,.7); --sim-overlay:rgba(15,23,42,.97);
  --disabled-bg:#475569; --disabled-txt:#94A3B8;
  --btn2-bg:transparent; --btn2-border:#334155;
  --err:#f87171;
}
[data-theme="light"]{
  --bg:#F4F7FB; --bg2:#EAF0F6; --nav-bg:#FFFFFF;
  --card:#FFFFFF; --card2:#EAF0F6;
  --line:#D7E0EA; --line2:#C6D2DE; --row-line:#E8EEF5; --hover-line:#C6D2DE;
  --txt:#0F172A; --txt2:#475569; --txt3:#64748B;
  --teal:#0F766E; --teal-hi:#0D9488; --accent-contrast:#FFFFFF; --gold:#0F766E;
  --field:#2F6B5A; --field-grad:#357a66;
  --shirt-bg:#FFFFFF; --shirt-line:#C6D2DE; --shirt-num:#475569;
  --hint-bg:#EAF0F6; --err-bg:#FEE2E2; --me-bg:#CCFBF1;
  --overlay:rgba(15,23,42,.35); --sim-overlay:rgba(244,247,251,.97);
  --disabled-bg:#E2E8F0; --disabled-txt:#94A3B8;
  --btn2-bg:#FFFFFF; --btn2-border:#CBD5E1;
  --err:#dc2626;
}
:root{
  /* tokens nomeados (espec) → mapeiam aos internos */
  --bg-primary:var(--bg); --bg-secondary:var(--bg2);
  --card-bg:var(--card); --card-border:var(--line);
  --text-primary:var(--txt); --text-secondary:var(--txt2);
  --accent:var(--teal); --accent-hover:var(--teal-hi);
  --button-primary:var(--teal); --button-primary-text:#FFFFFF;
  /* aliases legados */
  --cream:var(--bg); --ink:var(--txt); --blue:var(--teal); --white:var(--card); --muted:var(--txt2);
  --green:var(--field);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;}
.bebas{font-family:'Space Grotesk','Inter',sans-serif;font-weight:700;letter-spacing:-.01em;}
.topnav{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;border-bottom:1px solid var(--line);background:var(--nav-bg);flex-wrap:wrap;gap:8px;}
.logo{display:flex;align-items:center;gap:12px;}
.logo-title{font-family:'Space Grotesk',sans-serif;font-size:34px;line-height:1;}
.logo-1{color:var(--txt);}.logo-xi{color:var(--teal-hi);}
.logo-div{width:1px;height:32px;background:var(--line);}
.logo-sub{font-family:'Inter',sans-serif;font-size:10px;font-weight:600;line-height:1.3;color:var(--txt2);}
.logo-tag{font-size:8px;color:var(--txt2);letter-spacing:.14em;text-transform:uppercase;}
.nav-right{display:flex;align-items:center;gap:10px;}
.nav-status{font-size:11px;color:#666;letter-spacing:.05em;}
.lang-sel{border:1px solid var(--line);border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600;background:var(--card);color:var(--txt);cursor:pointer;font-family:'Inter',sans-serif;}
.theme-toggle{display:inline-flex;background:var(--card2);border:1px solid var(--line);border-radius:8px;padding:2px;gap:2px;}
.tt-opt{border:none;background:transparent;color:var(--txt2);font-size:11px;font-weight:600;font-family:'Inter',sans-serif;padding:5px 10px;border-radius:6px;cursor:pointer;transition:all .15s;}
.tt-opt:hover{color:var(--txt);}
.tt-opt.active{background:var(--teal);color:#fff;}
.screen{display:none;}
.screen.active{display:block;}
.config-wrap{max-width:920px;margin:0 auto;padding:44px 24px 60px;}.config-sub{font-size:14px;color:var(--txt2);line-height:1.6;max-width:560px;margin-bottom:30px;}.config-inst{font-size:12px;color:var(--txt2);line-height:1.6;max-width:620px;margin-top:30px;opacity:.85;}
.eyebrow{font-size:11px;font-weight:700;letter-spacing:.18em;color:var(--teal-hi);margin-bottom:8px;text-transform:uppercase;}
.config-title{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:46px;line-height:1.02;letter-spacing:-.02em;color:var(--txt);}
.config-title .xi{color:var(--teal-hi);}
.gold-bar{height:4px;width:64px;background:var(--teal-hi);border-radius:2px;margin:16px 0 10px;}
.config-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
@media(max-width:720px){.config-grid{grid-template-columns:1fr;}}
.ccard{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:20px;transition:border-color .15s;}.ccard:hover{border-color:var(--hover-line);}
.clabel{font-size:12px;font-weight:700;letter-spacing:.02em;color:var(--txt);margin-bottom:4px;}.cdesc{font-size:11px;color:var(--txt2);line-height:1.5;margin-bottom:14px;}
.opt-grid{display:flex;flex-wrap:wrap;gap:7px;}
.opt{border:1px solid var(--line);border-radius:8px;padding:8px 14px;font-size:12px;font-weight:600;color:var(--txt2);background:var(--card2);cursor:pointer;letter-spacing:.01em;transition:all .15s;}
.opt:hover{border-color:var(--teal-hi);color:var(--txt);}
.opt.sel{background:var(--teal);color:#fff;border-color:var(--teal);}
.opt.sel-blue{background:var(--teal);color:#fff;border-color:var(--teal);}
.opt-desc{font-size:11px;color:var(--txt2);margin-top:12px;line-height:1.5;min-height:28px;}
.liga-opt{display:flex;align-items:center;gap:9px;}
.liga-flag{width:22px;height:15px;border-radius:2px;overflow:hidden;flex-shrink:0;display:inline-flex;}
.start-row{margin-top:28px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
.btn-primary{background:var(--teal);color:#fff;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:15px;letter-spacing:.02em;padding:14px 28px;border-radius:8px;cursor:pointer;border:none;transition:background .15s;}
.btn-primary:hover{background:var(--teal-hi);}
.btn-primary:disabled{background:var(--disabled-bg);color:var(--disabled-txt);cursor:not-allowed;}
.start-hint{font-size:12px;color:var(--txt2);}
.build-main{display:flex;min-height:calc(100vh - 61px);}
.sidebar{width:236px;flex-shrink:0;border-right:1px solid var(--line);display:flex;flex-direction:column;background:var(--card);}
.saiu-block{padding:16px;border-bottom:1px solid var(--line);background:var(--card);}
.saiu-label{font-size:9px;font-weight:700;letter-spacing:.14em;color:var(--teal-hi);margin-bottom:5px;text-transform:uppercase;}
.saiu-clube{font-size:18px;font-weight:700;line-height:1.15;color:var(--txt);}
.saiu-ano{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:600;color:var(--teal-hi);}
.resort-block{padding:12px 16px;border-bottom:1px solid var(--line);background:var(--card);}
.resort-label{font-size:9px;font-weight:700;letter-spacing:.1em;color:var(--txt2);margin-bottom:7px;text-transform:uppercase;}
.resort-btns{display:flex;gap:6px;}
.rbtn{border:1px solid var(--line);border-radius:7px;padding:7px;font-size:9px;font-weight:700;background:var(--card2);color:var(--txt2);cursor:pointer;flex:1;letter-spacing:.03em;transition:all .15s;}
.rbtn:hover{border-color:var(--teal-hi);color:var(--txt);}
.choose-label{font-size:9px;font-weight:700;letter-spacing:.12em;color:var(--txt2);padding:10px 16px 6px;background:var(--card);border-bottom:1px solid var(--line);text-transform:uppercase;}
.player-list{flex:1;overflow-y:auto;background:var(--card);min-height:0;}
.prow{display:flex;align-items:center;padding:8px 12px;border-bottom:1px solid var(--row-line);cursor:pointer;gap:7px;transition:background .12s;}
.prow:hover{background:var(--card2);}
.prow.selected{background:var(--teal);}
.prow.taken{opacity:.35;cursor:default;}
.prow.taken:hover{background:var(--white);}
.pnum{font-size:9px;font-weight:700;color:var(--txt2);min-width:24px;}
.prow.selected .pnum{color:rgba(255,255,255,.6);}
.pname{font-size:12px;font-weight:500;flex:1;color:var(--txt);}
.prow.selected .pname{color:var(--white);}
.ppos{font-size:9px;color:var(--txt2);min-width:42px;font-weight:600;}
.prow.selected .ppos{color:rgba(255,255,255,.7);}
.povr{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:15px;color:var(--teal-hi);min-width:24px;text-align:right;}
.prow.selected .povr{color:var(--white);}
.confirm-hint{font-size:10px;color:var(--txt2);padding:9px 16px;background:var(--hint-bg);border-bottom:1px solid var(--line);line-height:1.5;}
.confirm-hint.err{color:var(--err);background:var(--err-bg);}
.next-draw{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:24px;background:var(--card);text-align:center;}
.check-circle{width:46px;height:46px;border-radius:50%;background:var(--teal);display:flex;align-items:center;justify-content:center;color:#fff;font-size:24px;}
.next-msg{font-size:11px;color:var(--txt2);line-height:1.6;}
.next-added{font-size:13px;font-weight:600;color:var(--txt);}
.btn-sm{background:var(--teal);color:#fff;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14px;letter-spacing:.02em;padding:12px 20px;border-radius:8px;cursor:pointer;border:none;width:100%;transition:background .15s;}.btn-sm:hover{background:var(--teal-hi);}
.field-area{flex:1;display:flex;align-items:center;justify-content:center;padding:18px;}
.field-wrap{background:linear-gradient(160deg,var(--field-grad),transparent);background-color:var(--field);border:1px solid var(--line);border-radius:12px;width:300px;height:460px;position:relative;overflow:hidden;flex-shrink:0;}
.boxscore{width:200px;flex-shrink:0;border-left:1px solid var(--line);padding:16px 13px;background:var(--bg2);}
.bs-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;}
.bs-title{font-size:9px;font-weight:700;letter-spacing:.12em;color:var(--txt2);text-transform:uppercase;}
.bs-ovr{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:26px;color:var(--teal-hi);}
.bs-row{display:flex;align-items:center;padding:5px 0;border-bottom:1px solid var(--line);gap:5px;}
.bs-row:last-child{border-bottom:none;}
.bs-pos{font-size:9px;font-weight:700;color:var(--txt2);min-width:30px;letter-spacing:.05em;}
.bs-name{font-size:10px;color:var(--txt3);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bs-name.filled{color:var(--txt);font-weight:500;}
.bs-num{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:13px;color:var(--teal-hi);}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:.9}}
.spinner{width:38px;height:38px;border:3px solid var(--teal-hi);border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite;}
.load-center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:var(--card);}
.load-txt{font-size:11px;color:var(--txt2);letter-spacing:.08em;font-weight:600;}
.fdot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.5);}
.fdot:nth-child(1){animation:pulse 1.2s infinite 0s;}
.fdot:nth-child(2){animation:pulse 1.2s infinite .2s;}
.fdot:nth-child(3){animation:pulse 1.2s infinite .4s;}
.results-wrap{max-width:980px;margin:0 auto;padding:30px 24px 60px;}
.res-header{display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:16px;margin-bottom:8px;}
.res-pos-big{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:76px;line-height:.9;color:var(--teal-hi);}
.res-pos-label{font-size:10px;font-weight:700;letter-spacing:.14em;color:var(--txt2);text-transform:uppercase;}
.res-summary{font-size:13px;color:var(--txt2);line-height:1.6;max-width:460px;}
.res-tabs{display:flex;gap:0;border-bottom:1px solid var(--line);margin:24px 0 18px;}
.rtab{padding:10px 22px;font-size:11px;font-weight:700;letter-spacing:.06em;color:var(--txt2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;text-transform:uppercase;}
.rtab.active{color:var(--teal-hi);border-bottom-color:var(--teal-hi);}
table{width:100%;border-collapse:collapse;background:var(--card);border-radius:10px;overflow:hidden;font-size:12px;border:1px solid var(--line);}
th{font-size:9px;font-weight:700;letter-spacing:.08em;color:var(--txt2);text-align:left;padding:10px;border-bottom:1px solid var(--line);background:var(--bg2);text-transform:uppercase;}
th.c,td.c{text-align:center;}
td{padding:8px 10px;border-bottom:1px solid var(--row-line);color:var(--txt);}
tr.me{background:var(--me-bg);}
tr.me td{font-weight:700;}
td.pos-cell{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:14px;color:var(--txt2);width:34px;}
tr.me td.pos-cell{color:var(--teal-hi);}
.res-w{color:#34d399;font-weight:700;}
.res-d{color:#fbbf24;font-weight:700;}
.res-l{color:#f87171;font-weight:700;}
.match-row td{font-size:11px;}
.btn-row{display:flex;gap:12px;margin-top:26px;flex-wrap:wrap;}
.btn-secondary{background:var(--btn2-bg);color:var(--txt);font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14px;letter-spacing:.02em;padding:13px 24px;border-radius:8px;cursor:pointer;border:1px solid var(--btn2-border);transition:border-color .15s;}.btn-secondary:hover{border-color:var(--teal-hi);}
.zebra{font-size:10px;color:var(--txt2);margin-top:10px;}
.res-topbar{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
.res-title{font-size:30px;line-height:1.05;color:var(--txt);font-weight:700;}
.btn-gold{background:transparent;border:1px solid var(--teal-hi);color:var(--teal-hi);font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:13px;letter-spacing:.02em;padding:10px 16px;border-radius:8px;cursor:pointer;transition:all .15s;}
.btn-gold:hover{background:var(--teal-hi);color:var(--accent-contrast);}
.btn-mini{font-size:16px;padding:9px 18px;}
.team-input{width:100%;border:1px solid var(--line);border-radius:8px;padding:10px 12px;font-size:13px;font-family:'Inter',sans-serif;font-weight:600;background:var(--card2);color:var(--txt);outline:none;}
.team-input:focus{border-color:var(--teal-hi);}
tr.me td:first-child{border-left:3px solid var(--teal-hi);}
.me-star{color:var(--teal-hi);margin-right:3px;}
.modal-overlay{position:fixed;inset:0;background:var(--overlay);display:none;align-items:center;justify-content:center;z-index:60;padding:18px;}
.modal-overlay.show{display:flex;}
.modal-panel{background:var(--bg2);border-radius:14px;max-width:520px;width:100%;max-height:86vh;overflow-y:auto;padding:24px;border:1px solid var(--line);}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.modal-x{border:none;background:none;font-size:26px;cursor:pointer;color:var(--txt2);line-height:1;}
.sum-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:6px;}
@media(max-width:560px){.sum-grid{grid-template-columns:1fr 1fr;}}
.sum-card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:11px 13px;}
.sum-lbl{font-size:8px;font-weight:700;letter-spacing:.1em;color:var(--txt2);margin-bottom:4px;text-transform:uppercase;}
.sum-val{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:20px;color:var(--txt);}
.sum-val.blue{color:var(--teal-hi);}
.sum-val.small{font-size:13px;font-family:'Inter',sans-serif;font-weight:600;line-height:1.4;}
.squad-row{display:flex;align-items:center;gap:8px;background:var(--card);border-bottom:1px solid var(--row-line);padding:8px 12px;}
.squad-row:first-child{border-radius:8px 8px 0 0;}
.squad-row:last-child{border-radius:0 0 8px 8px;border-bottom:none;}
.sq-pos{font-size:9px;font-weight:700;color:var(--txt2);min-width:32px;letter-spacing:.05em;}
.sq-num{font-size:9px;font-weight:700;color:var(--txt3);min-width:26px;}
.sq-name{font-size:12px;font-weight:600;flex:1;color:var(--txt);}
.sq-tag{font-size:9px;color:var(--txt2);}
.sq-ovr{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:15px;color:var(--teal-hi);min-width:24px;text-align:right;}
.sim-overlay{position:fixed;inset:0;background:var(--sim-overlay);display:none;align-items:center;justify-content:center;flex-direction:column;gap:18px;z-index:50;}
.sim-overlay.show{display:flex;}
.sim-round{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:44px;color:var(--teal-hi);}
.sim-label{font-size:11px;color:var(--txt2);letter-spacing:.12em;font-weight:700;text-transform:uppercase;}
</style>
</head>
<body>

<div class="topnav">
  <div class="logo" style="cursor:pointer;" role="button" tabindex="0" aria-label="Home / Início" onclick="goHome()" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();goHome()}">
    <div class="logo-title"><span class="logo-1">1</span><span class="logo-xi">XI</span></div>
    <div class="logo-div"></div>
    <div><div class="logo-sub bebas" id="navSlogan"></div><div class="logo-tag" id="navTag"></div></div>
  </div>
  <div class="nav-right">
    <span class="nav-status" id="navStatus"></span>
    <div class="theme-toggle" id="themeToggle" role="group" aria-label="Tema">
      <button class="tt-opt" id="ttLight" onclick="applyTheme('light')"></button>
      <button class="tt-opt" id="ttDark" onclick="applyTheme('dark')"></button>
    </div>
    <select class="lang-sel" id="langSel" onchange="setLang(this.value)">
      <option value="pt">Português</option>
      <option value="en">English</option>
      <option value="es">Español</option>
      <option value="tr">Türkçe</option>
      <option value="fr">Français</option>
      <option value="de">Deutsch</option>
    </select>
  </div>
</div>

<div class="screen active" id="screenConfig">
  <div class="config-wrap">
    <div class="eyebrow" id="cfgEyebrow"></div>
    <div class="config-title" id="cfgTitle"></div>
    <div class="gold-bar"></div>
    <div class="config-sub" id="cfgSub"></div>
    <div class="config-grid">
      <div class="ccard"><div class="clabel" id="lblFormation"></div><div class="cdesc" id="cdFormation"></div><div class="opt-grid" id="optFormation"></div><div class="opt-desc" id="descFormation"></div></div>
      <div class="ccard"><div class="clabel" id="lblStyle"></div><div class="cdesc" id="cdStyle"></div><div class="opt-grid" id="optStyle"></div><div class="opt-desc" id="descStyle"></div></div>
      <div class="ccard"><div class="clabel" id="lblDiff"></div><div class="cdesc" id="cdDiff"></div><div class="opt-grid" id="optDiff"></div><div class="opt-desc" id="descDiff"></div></div>
      <div class="ccard"><div class="clabel" id="lblLiga"></div><div class="cdesc" id="cdLeague"></div><div class="opt-grid" id="optLiga" style="flex-direction:column;align-items:stretch;"></div><div class="opt-desc" id="descLiga"></div></div>
    </div>
    <div class="start-row">
      <button class="btn-primary" id="btnStart" disabled onclick="startBuild()"></button>
      <div class="start-hint" id="startHint"></div>
    </div>
    <div class="config-inst" id="cfgInst"></div>
  </div>
</div>

<div class="screen" id="screenBuild">
  <div class="build-main">
    <div class="sidebar" id="buildSidebar"></div>
    <div class="field-area">
      <div class="field-wrap">
        <svg style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;" viewBox="0 0 300 460">
          <rect x="1" y="1" width="298" height="458" rx="10" fill="none" stroke="rgba(148,163,184,.22)" stroke-width="1"/>
          <rect x="85" y="1" width="130" height="56" fill="none" stroke="rgba(148,163,184,.22)" stroke-width="1"/>
          <rect x="85" y="403" width="130" height="56" fill="none" stroke="rgba(148,163,184,.22)" stroke-width="1"/>
          <line x1="1" y1="230" x2="299" y2="230" stroke="rgba(148,163,184,.16)" stroke-width="1"/>
          <circle cx="150" cy="230" r="38" fill="none" stroke="rgba(148,163,184,.16)" stroke-width="1"/>

let LANG='pt';
/* ===== ThemeToggle (componente) ===== */
let THEME='dark';
try{THEME=localStorage.getItem('theme')||'dark';}catch(e){}
document.documentElement.setAttribute('data-theme',THEME);
function applyTheme(th){
  THEME=(th==='light')?'light':'dark';
  try{localStorage.setItem('theme',THEME);}catch(e){}
  document.documentElement.setAttribute('data-theme',THEME);
  renderThemeToggle();
}
function renderThemeToggle(){
  const l=document.getElementById('ttLight'),d=document.getElementById('ttDark');
  if(!l||!d)return;
  l.textContent='☀ '+t('themeLight');
  d.textContent='🌙 '+t('themeDark');
  l.classList.toggle('active',THEME==='light');
  d.classList.toggle('active',THEME==='dark');
}
function t(key,vars){let s=I18N[LANG][key];if(s===undefined)s=I18N.pt[key]||key;if(vars)for(const k in vars)s=s.split('{'+k+'}').join(vars[k]);return s;}
function tn(group,key){const g=I18N[LANG][group]||I18N.pt[group];return g[key]||I18N.pt[group][key]||key;}
function ordinal(n){
  if(LANG==='en'){const s=['th','st','nd','rd'],v=n%100;return n+(s[(v-20)%10]||s[v]||s[0]);}
  if(LANG==='fr')return n===1?'1er':n+'e';
  if(LANG==='tr'||LANG==='de')return n+'.';
  return n+'º';
}
function setLang(l){LANG=l;document.getElementById('langSel').value=l;renderStatic();closeMyTeam();
  if(S.screen==='screenConfig')renderConfig();
  if(S.screen==='screenBuild')renderBuild();
  if(S.screen==='screenResults')renderResults();
  if(S.screen==='screenFinal')renderFinal();
}
function renderStatic(){document.getElementById('navSlogan').textContent=t('slogan');document.getElementById('navTag').textContent=t('tagline');renderThemeToggle();updateNavStatus();}
function updateNavStatus(){
  const el=document.getElementById('navStatus');
  if(S.formation&&S.style&&S.diff&&S.league&&S.screen!=='screenConfig'){
    el.textContent=S.formation+' · '+tn('styles',S.style).toUpperCase()+' · '+tn('diffs',S.diff).toUpperCase()+' · '+LEAGUES[S.league].name.toUpperCase();
  } else el.textContent='';
}

/* =====================================================================
   TEAM RANDOMIZER — sorteio de times memoráveis com cooldown
   ---------------------------------------------------------------------
   REGRAS:
   1) Nunca repete o mesmo teamId dentro da MESMA RODADA (campeonato
      atual) — controlado via `excludedTeamIds` (S.roundTeamIds).
   2) Entre rodadas/partidas diferentes, cada time sorteado entra num
      histórico recente por liga (cooldown = 6). Times no cooldown só
      voltam a ser sorteáveis depois que outros 6 tiverem sido usados.
   3) Se o pool elegível ficar pequeno demais (após aplicar as regras
      1 e 2), o cooldown é relaxado gradualmente, liberando primeiro os
      times mais ANTIGOS do histórico, até existir opção suficiente.
   4) O histórico é persistido em localStorage (chave '1xi_recent_teams')
      para que o cooldown valha entre sessões de jogo.
===================================================================== */

const RECENT_TEAMS_KEY = '1xi_recent_teams';
const TEAM_COOLDOWN = 6;

function loadRecentTeams(){
  try{
    const raw = localStorage.getItem(RECENT_TEAMS_KEY);
    if(!raw) return {};
    const parsed = JSON.parse(raw);
    return (parsed && typeof parsed==='object') ? parsed : {};
  }catch(e){ return {}; }
}
function saveRecentTeams(map){
  try{ localStorage.setItem(RECENT_TEAMS_KEY, JSON.stringify(map)); }catch(e){}
}
// histórico em memória, carregado uma vez (persistido a cada atualização)
let recentTeamsByLeague = loadRecentTeams();

function shuffleArray(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

// Retorna todos os times memoráveis de uma liga (catálogo MEMORABLE_TEAMS)
function getLeagueTeamPool(leagueId){
  return MEMORABLE_TEAMS.filter(tm=>tm.league===leagueId);
}

// Aplica as regras de elegibilidade: fora da rodada atual e fora do cooldown
function getEligibleTeams(leagueId, excludedTeamIds, cooldownSet){
  const pool=getLeagueTeamPool(leagueId);
  return pool.filter(tm=>!excludedTeamIds.includes(tm.id) && !cooldownSet.has(tm.id));
}

// Atualiza o histórico recente (FIFO, máx = cooldown) após usar um time
function updateRecentHistory(leagueId, teamId){
  const hist = recentTeamsByLeague[leagueId] || [];
  const next = hist.filter(id=>id!==teamId);
  next.push(teamId);
  while(next.length>TEAM_COOLDOWN) next.shift();
  recentTeamsByLeague[leagueId]=next;
  saveRecentTeams(recentTeamsByLeague);
}

/* getRandomMemorableTeam
   params:
     - leagueId: 'english'|'spanish'|'italian'|'german'|'french'|'turkish'
     - excludedTeamIds: array de ids que NUNCA podem repetir nesta chamada
       (ex.: adversários já sorteados na rodada atual)
     - cooldown: tamanho do histórico (default TEAM_COOLDOWN = 6)
     - onlyIds: opcional — restringe o sorteio a um subconjunto de ids
       (útil para sortear apenas elencos jogáveis, por exemplo)
   Prioridade de fallback:
     1. pool da liga -> remove excludedTeamIds -> remove cooldown -> sorteia
     2. se pool elegível vazio, libera gradualmente os mais ANTIGOS do
        cooldown (um a um) até existir pelo menos 1 opção
     3. NUNCA repete um id presente em excludedTeamIds (regra absoluta)
*/
function getRandomMemorableTeam({leagueId, excludedTeamIds=[], cooldown=TEAM_COOLDOWN, onlyIds=null}){
  let pool=getLeagueTeamPool(leagueId);
  if(onlyIds) pool=pool.filter(tm=>onlyIds.includes(tm.id));

  let hist = (recentTeamsByLeague[leagueId]||[]).slice(0,cooldown);
  let cooldownSet=new Set(hist);

  let eligible = pool.filter(tm=>!excludedTeamIds.includes(tm.id) && !cooldownSet.has(tm.id));

  // fallback: libera gradualmente os mais antigos do cooldown
  while(eligible.length===0 && hist.length>0){
    hist=hist.slice(1); // remove o mais antigo
    cooldownSet=new Set(hist);
    eligible=pool.filter(tm=>!excludedTeamIds.includes(tm.id) && !cooldownSet.has(tm.id));
  }
  // último fallback absoluto: qualquer time fora da rodada atual
  if(eligible.length===0){
    eligible=pool.filter(tm=>!excludedTeamIds.includes(tm.id));
  }
  if(eligible.length===0) return null; // pool esgotado (não deve ocorrer com 19+ times)

  const chosen=shuffleArray(eligible)[0];
  updateRecentHistory(leagueId, chosen.id);
  return chosen;
}


/* =====================================================================
   teamIdOf — gera o id único usado tanto em MEMORABLE_TEAMS quanto nos
   elencos jogáveis de LEAGUES[liga].squads, para que cooldown e
   histórico funcionem de forma unificada entre catálogo e elencos.
===================================================================== */
function teamIdOf(leagueKey, clube, ano){
  const lid = LEAGUE_ID[leagueKey];
  const slug = s => s.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'');
  return lid+'_'+slug(clube)+'_'+slug(ano);
}
const LEAGUE_ID = {
  premier:'english', laliga:'spanish', seriea:'italian',
  bundesliga:'german', ligue1:'french', superlig:'turkish'
};

/* drawPlayableSquad — sorteia o PRÓXIMO elenco jogável para a montagem.
   Usa o mesmo randomizer de cooldown (6) sobre os 20 elencos da liga
   escolhida, mas com `onlyIds` restrito aos ids dos elencos jogáveis
   (os mesmos 20 de LEAGUES[liga].squads), e excludedTeamIds = elenco
   atual (para nunca repetir o time imediatamente anterior).
*/
function drawPlayableSquad(){
  const leagueKey=S.league;
  const lid=LEAGUE_ID[leagueKey];
  const squads=LEAGUES[leagueKey].squads;
  const onlyIds=squads.map(sq=>teamIdOf(leagueKey,sq.clube,sq.ano));
  const excluded=S.currentSquadId?[S.currentSquadId]:[];

  const picked=getRandomMemorableTeam({leagueId:lid, excludedTeamIds:excluded, cooldown:TEAM_COOLDOWN, onlyIds});
  let squad;
  if(picked){
    squad=squads.find(sq=>teamIdOf(leagueKey,sq.clube,sq.ano)===picked.id);
    S.currentSquadId=picked.id;
  }else{
    // fallback absoluto: sorteio simples entre os 20 (não deve ocorrer)
    squad=squads[Math.floor(Math.random()*squads.length)];
    S.currentSquadId=teamIdOf(leagueKey,squad.clube,squad.ano);
  }
  S.currentSquad=squad;
  return squad;
}

/* ===================== POSIÇÕES / COMPATIBILIDADE ===================== */
function playerPositions(p){return p.pos.split('/');} // [principal, secundária?]
function accepts(slotPos,p){return playerPositions(p).includes(slotPos);}
// Vaga: primeiro tenta posição principal, depois secundária
function findSlotFor(p){
  const [main,sec]=playerPositions(p);
  let s=S.slots.find(sl=>sl.pos===main&&!S.filled[sl.id]);
  if(!s&&sec)s=S.slots.find(sl=>sl.pos===sec&&!S.filled[sl.id]);
  return s||null;
}
function fitsAnyEmpty(p){return !!findSlotFor(p);}

function pick(key,val){S[key]=val;renderConfig();}

/* ===================== BUILD FLOW ===================== */
function buildSlots(){
  S.slots=FORMATIONS[S.formation].slots.map((s,i)=>({id:'S'+i,pos:s[0],x:s[1],y:s[2]}));
}
function startBuild(){
  S.rerolls=DIFFS[S.diff].rerolls;
  S.filled={};S.selected=null;S.phase='choose';S.lastAdded=null;S.msg=null;
  S.usedNames=new Set();
  S.currentSquad=null;S.currentSquadId=null;
  S.roundTeamIds=[]; // ids dos times já usados nesta partida (jogador + 19 adversários)
  buildSlots();
  drawPlayableSquad();
  S.roundTeamIds.push(S.currentSquadId); // o elenco escolhido pelo jogador conta para a rodada
  S.screen='screenBuild';
  updateNavStatus();
  showScreen('screenBuild');
  drawSquadWithLoading();
}
function currentSquad(){return S.currentSquad;}
function drawSquadWithLoading(){
  S.phase='loading';renderBuild();
  setTimeout(()=>{S.phase='choose';S.selected=null;S.msg=null;renderBuild();},850);
}
function drawNext(){
  drawPlayableSquad();
  if(!S.roundTeamIds.includes(S.currentSquadId))S.roundTeamIds.push(S.currentSquadId);
  drawSquadWithLoading();
}
function skipFree(){drawNext();}
function resort(){
  if(S.rerolls<=0)return;
  S.rerolls--;S.selected=null;S.msg=null;
  drawNext();
}
function selectPlayer(p){
  if(S.usedNames.has(p.name))return;
  const slot=findSlotFor(p);
  if(!slot){S.msg={type:'err',text:t('incompat',{name:p.name,pos:playerPositions(p).join('/')})};S.selected=null;renderBuild();return;}
  if(S.selected&&S.selected.name===p.name){
    S.filled[slot.id]={...p,tag:currentSquad().tag,slotId:slot.id,slotPos:slot.pos};
    S.usedNames.add(p.name);
    S.lastAdded=p;S.selected=null;S.msg=null;S.phase='nextdraw';
  }else{
    S.selected={...p,targetSlot:slot.id};
    S.msg={type:'hint',text:t('confirm',{name:p.name,pos:slot.pos})};
  }
  renderBuild();
}

function shirtSVG(num,blue){const f=blue?'var(--teal)':'var(--shirt-bg)';const st=blue?'var(--teal-hi)':'var(--shirt-line)';const tc=blue?'#fff':'var(--shirt-num)';
  return '<svg viewBox="0 0 36 32" width="36" height="32"><path d="M9,2 L2,9 L8,11 L8,30 L28,30 L28,11 L34,9 L27,2 Q23,5 18,5 Q13,5 9,2Z" style="fill:'+f+';stroke:'+st+'" stroke-width="0.5"/><text x="18" y="22" text-anchor="middle" font-family="Space Grotesk,sans-serif" font-size="11" style="fill:'+tc+'">'+num+'</text></svg>';}

function renderBuild(){
  const fs=document.getElementById('fieldSlots');
  const fl=document.getElementById('fieldLoading');
  fl.style.display=S.phase==='loading'?'flex':'none';
  fs.style.opacity=S.phase==='loading'?'.3':'1';
  fs.innerHTML='';
  S.slots.forEach(slot=>{
    const f=S.filled[slot.id];
    const isTarget=S.selected&&S.selected.targetSlot===slot.id;
    const div=document.createElement('div');
    div.style.cssText='position:absolute;left:'+slot.x+'%;top:'+slot.y+'%;transform:translate(-50%,-50%);text-align:center;';
    div.innerHTML=shirtSVG(f?f.num:(isTarget?S.selected.num:''),f?true:isTarget);
    const n=document.createElement('div');
    n.style.cssText='font-size:7.5px;font-weight:700;white-space:nowrap;margin-top:1px;color:'+(f?'#fff':(isTarget?'rgba(255,255,255,.85)':'rgba(255,255,255,.32)'))+';';
    n.textContent=f?f.name:(isTarget?S.selected.name:slot.pos);
    div.appendChild(n);fs.appendChild(div);
  });

  const sb=document.getElementById('buildSidebar');
  const count=Object.keys(S.filled).length;
  const sq=currentSquad();
  const showOvr=DIFFS[S.diff]?.showOvr ?? true;

  if(S.phase==='loading'){
    sb.innerHTML='<div class="load-center"><div class="spinner"></div><div class="load-txt">'+t('drawing')+'</div></div>';
  } else if(S.phase==='nextdraw'){
    if(count>=11){
      sb.innerHTML='<div class="next-draw"><div class="check-circle">✓</div><div class="next-added">'+t('complete')+'</div><div class="next-msg">'+t('completeMsg',{ovr:avgOvr()})+'</div><div style="width:100%;text-align:left;"><div class="resort-label" style="margin-bottom:5px;">'+t('nameTitle')+'</div><input class="team-input" id="teamNameInput" maxlength="24" placeholder="'+t('namePh')+'" value="'+(S.teamName?S.teamName.replace(/"/g,'&quot;'):'')+'"></div><button class="btn-sm" onclick="startChampionship()">'+t('startChamp')+'</button></div>';
    }else{
      sb.innerHTML='<div class="next-draw"><div class="check-circle">✓</div><div class="next-added">'+t('added',{name:S.lastAdded.name})+'</div><div class="next-msg">'+t('filledMsg',{n:count})+'</div><button class="btn-sm" onclick="drawNext()">'+t('drawBtn')+'</button></div>';
    }
  } else {
    const players=sq.players.map(a=>({num:a[0],name:a[1],pos:a[2],ovr:a[3]}));
    const compatCount=players.filter(p=>!S.usedNames.has(p.name)&&fitsAnyEmpty(p)).length;
    const resBlock=S.rerolls>0?
      '<div class="resort-block"><div class="resort-label">'+t('resort')+' · '+t(S.rerolls===1?'left1':'leftN',{n:S.rerolls})+'</div><div class="resort-btns"><button class="rbtn" onclick="resort()">'+t('otherClub')+'</button><button class="rbtn" onclick="resort()">'+t('otherSeason')+'</button></div></div>':'';
    const msgHtml=S.msg?'<div class="confirm-hint '+(S.msg.type==='err'?'err':'')+'">'+S.msg.text+'</div>':'';
    const noCompat=compatCount===0?'<div class="confirm-hint err">'+t('nocompat')+'</div><div style="padding:10px 16px;background:#fff;border-bottom:0.5px solid #eee;"><button class="btn-sm" onclick="skipFree()" style="font-size:14px;padding:9px;">'+t('skip')+'</button></div>':'';
    sb.innerHTML=
      '<div class="saiu-block"><div class="saiu-label">'+t('saiu')+'</div><div class="saiu-clube">'+sq.clube+'</div><div class="saiu-ano">'+sq.ano+'</div></div>'
      +resBlock
      +'<div class="choose-label">'+t('choose')+'</div>'+msgHtml+noCompat
      +'<div class="player-list" id="plist"></div>';
    const list=document.getElementById('plist');
    players.forEach(p=>{
      const used=S.usedNames.has(p.name);
      const ok=!used&&fitsAnyEmpty(p);
      const row=document.createElement('div');
      row.className='prow'+(S.selected&&S.selected.name===p.name?' selected':'')+(ok?'':' taken');
      row.innerHTML='<span class="pnum">#'+p.num+'</span><span class="pname">'+p.name+'</span><span class="ppos">'+p.pos+'</span>'+(showOvr?'<span class="povr">'+p.ovr+'</span>':'');
      if(ok)row.onclick=()=>selectPlayer(p);
      else if(!used)row.onclick=()=>selectPlayer(p); // mostra mensagem de incompatibilidade
      list.appendChild(row);
    });
  }

  document.getElementById('bsLbl').textContent=t('box');
  document.getElementById('bsCount').textContent=count;
  document.getElementById('bsOvr').textContent=count?avgOvr():'';
  document.getElementById('bsRows').innerHTML=S.slots.map(slot=>{
    const f=S.filled[slot.id];
    return '<div class="bs-row"><span class="bs-pos">'+slot.pos+'</span><span class="bs-name '+(f?'filled':'')+'">'+(f?f.name+' <span style="font-size:8px;color:#999;">'+f.tag+'</span>':'—')+'</span>'+(f?'<span class="bs-num">'+f.ovr+'</span>':'')+'</div>';
  }).join('');
}
function avgOvr(){const o=Object.values(S.filled).map(f=>f.ovr);return o.length?Math.round(o.reduce((a,b)=>a+b,0)/o.length):0;}

/* ===================== VALIDAÇÃO PRÉ-CAMPEONATO ===================== */
function validateTeam(){
  const errs=[];
  const list=Object.values(S.filled);
  if(list.length!==11)errs.push(t('valCount'));
  const seen=new Set();
  list.forEach(f=>{
    if(seen.has(f.name))errs.push(t('valDup',{name:f.name}));
    seen.add(f.name);
    if(!accepts(f.slotPos,f))errs.push(t('valPos',{name:f.name}));
  });
  return errs;
}
function startChampionship(){
  const inp=document.getElementById('teamNameInput');
  const v=inp?inp.value.trim():'';
  S.teamName=v||t('myTeam');
  trySimulate();
}
function myName(){return S.teamName||t('myTeam');}
function trySimulate(){
  const errs=validateTeam();
  if(errs.length){S.msg={type:'err',text:errs.join(' ')};S.phase='choose';renderBuild();return;}
  simulate();
}

/* ===================== SIMULAÇÃO (modelo setorial) ===================== */
function shuffle(a){const arr=[...a];for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}
function poisson(lambda){let L=Math.exp(-lambda),k=0,p=1;do{k++;p*=Math.random();}while(p>L);return k-1;}

function playerSectors(){
  const sums={def:[],mid:[],att:[]};
  S.slots.forEach(sl=>{const f=S.filled[sl.id];if(f)sums[SECTOR[sl.pos]].push(f.ovr);});
  const avg=a=>a.length?a.reduce((x,y)=>x+y,0)/a.length:avgOvr();
  return {def:avg(sums.def),mid:avg(sums.mid),att:avg(sums.att)};
}

function buildChampionship(){
  const diff=DIFFS[S.diff];
  const lid=LEAGUE_ID[S.league];
  const opps=[];
  for(let i=0;i<19;i++){
    // nunca repete um time já usado nesta rodada (jogador + adversários anteriores)
    const tm=getRandomMemorableTeam({leagueId:lid, excludedTeamIds:S.roundTeamIds, cooldown:TEAM_COOLDOWN});
    S.roundTeamIds.push(tm.id);
    const base=tm.strength+diff.opp;
    const d1=(Math.random()-0.5)*3, d2=(Math.random()-0.5)*3;
    opps.push({id:'opp'+i,name:tm.clube+' '+tm.ano,def:base+d1,mid:base,att:base+d2,varr:0,isPlayer:false});
  }
  const fm=FORMATIONS[S.formation], st=STYLES[S.style];
  const sec=playerSectors();
  const bonus=diff.player;
  const player={
    id:'me', name:myName(),
    att:sec.att+bonus+fm.atk+st.atk,
    mid:sec.mid+bonus+(fm.atk+fm.defn+st.atk+st.defn)/4,
    def:sec.def+bonus+fm.defn+st.defn,
    varr:st.varr+diff.varr, isPlayer:true
  };
  S.meStats={ovr:avgOvr(),att:Math.round(player.att),mid:Math.round(player.mid),def:Math.round(player.def)};
  return [player,...opps];
}

function genFixtures(teams){
  const n=teams.length, ids=teams.map(tm=>tm.id);
  const fixed=ids[0], rot=ids.slice(1);
  const firstHalf=[];
  for(let r=0;r<n-1;r++){
    const round=[];
    const left=[fixed,...rot.slice(0,(n/2)-1)];
    const right=rot.slice((n/2)-1).reverse();
    for(let i=0;i<n/2;i++){
      if(i===0&&r%2===1)round.push([right[i],left[i]]);
      else round.push([left[i],right[i]]);
    }
    firstHalf.push(round);
    rot.unshift(rot.pop());
  }
  return [...firstHalf,...firstHalf.map(rd=>rd.map(([h,a])=>[a,h]))];
}

/* Motor de partida: forças setoriais + exponencial calibrada + ruído controlado.
   Gols esperados ~1.3 casa / ~1.05 fora entre iguais; goleadas só com grande diferença. */
function simMatch(home,away){
  const atkH=0.62*home.att+0.38*home.mid;
  const defA=0.62*away.def+0.38*away.mid;
  const atkA=0.62*away.att+0.38*away.mid;
  const defH=0.62*home.def+0.38*home.mid;
  let lh=1.18*Math.exp(0.042*(atkH-defA))*1.16;
  let la=1.18*Math.exp(0.042*(atkA-defH))*0.90;
  const nH=1+(Math.random()-0.5)*0.16*(1+(home.varr||0));
  const nA=1+(Math.random()-0.5)*0.16*(1+(away.varr||0));
  lh=Math.min(3.1,Math.max(0.18,lh*nH));
  la=Math.min(3.1,Math.max(0.18,la*nA));
  return [poisson(lh),poisson(la)];
}

function simulate(){
  const overlay=document.getElementById('simOverlay');
  document.getElementById('simLabel').textContent=t('simulating');
  overlay.classList.add('show');
  const teams=buildChampionship();
  const fixtures=genFixtures(teams);
  const tmap={};teams.forEach(tm=>tmap[tm.id]={...tm,pts:0,j:0,v:0,e:0,d:0,gp:0,gc:0,tb:Math.random()});
  const myMatches=[];
  let r=0;
  const interval=setInterval(()=>{
    if(r>=38){clearInterval(interval);finishSim(tmap,myMatches);overlay.classList.remove('show');return;}
    document.getElementById('simRound').textContent=t('round')+' '+(r+1);
    fixtures[r].forEach(([hId,aId])=>{
      const h=tmap[hId],a=tmap[aId];
      const [gh,ga]=simMatch(h,a);
      h.j++;a.j++;h.gp+=gh;h.gc+=ga;a.gp+=ga;a.gc+=gh;
      if(gh>ga){h.v++;a.d++;h.pts+=3;}
      else if(gh<ga){a.v++;h.d++;a.pts+=3;}
      else{h.e++;a.e++;h.pts++;a.pts++;}
      if(hId==='me'||aId==='me'){
        const mine=hId==='me';
        myMatches.push({rodada:r+1,mandante:h.name,visitante:a.name,gh,ga,
          resultado:(mine?(gh>ga?'V':gh<ga?'D':'E'):(ga>gh?'V':ga<gh?'D':'E')),homeIsMe:mine});
      }
    });
    r++;
  },55);
}

function finishSim(tmap,myMatches){
  const table=Object.values(tmap).sort((a,b)=>
    b.pts-a.pts || (b.gp-b.gc)-(a.gp-a.gc) || b.gp-a.gp || b.v-a.v || a.tb-b.tb
  );
  S.results={table,myMatches};
  S.screen='screenResults';
  renderResults();
  showScreen('screenResults');
}

/* ===================== RESULTADOS ===================== */
function renderResults(){
  if(!S.results)return;
  const {table,myMatches}=S.results;
  const myPos=table.findIndex(tm=>tm.isPlayer)+1;
  const me=table[myPos-1];
  const champ=table[0];
  document.getElementById('resTitle').textContent=t('classFinal');
  document.getElementById('btnMyTeam').textContent=t('myBtn');
  document.getElementById('btnGoFinal').textContent=t('resBtn');
  document.getElementById('resPosLabel').textContent=t('finalLabel');
  document.getElementById('resPos').textContent=ordinal(myPos);
  document.getElementById('rtab0').textContent=t('tabT');
  document.getElementById('rtab1').textContent=t('tabR');
  document.getElementById('btnResim').textContent=t('resim');
  document.getElementById('btnNew').textContent=t('newG');
  document.getElementById('zebraNote').textContent=t('zebra');
  const vars={pts:me.pts,v:me.v,e:me.e,d:me.d,champ:champ.isPlayer?myName():champ.name,cpts:champ.pts};
  let key='ph3';
  if(myPos===1)key='ph1';else if(myPos<=4)key='ph2';else if(myPos<=10)key='ph3';else if(myPos<=17)key='ph4';else key='ph5';
  document.getElementById('resSummary').textContent=t(key,vars);

  const TH=I18N[LANG].th;
  // Colunas: # · Time · J · V · E · D · GF · SG · PTS
  document.getElementById('resTabela').innerHTML=
    '<table><thead><tr><th class="c">#</th><th>'+TH.team+'</th><th class="c">'+TH.j+'</th><th class="c">'+TH.v+'</th><th class="c">'+TH.e+'</th><th class="c">'+TH.d+'</th><th class="c">'+TH.gp+'</th><th class="c">'+TH.sg+'</th><th class="c">'+TH.p+'</th></tr></thead><tbody>'
    +table.map((tm,i)=>{
      const name=tm.isPlayer?'<span class="me-star">★</span>'+myName():tm.name;
      const sg=tm.gp-tm.gc;
      return '<tr class="'+(tm.isPlayer?'me':'')+'"><td class="pos-cell c">'+(i+1)+'</td><td>'+name+'</td><td class="c">'+tm.j+'</td><td class="c">'+tm.v+'</td><td class="c">'+tm.e+'</td><td class="c">'+tm.d+'</td><td class="c">'+tm.gp+'</td><td class="c">'+(sg>0?'+':'')+sg+'</td><td class="c"><b>'+tm.pts+'</b></td></tr>';
    }).join('')+'</tbody></table>';

  document.getElementById('resJogos').innerHTML=
    '<table><thead><tr><th class="c">'+TH.rod+'</th><th>'+TH.home+'</th><th class="c">'+TH.score+'</th><th>'+TH.away+'</th><th class="c">'+TH.res+'</th></tr></thead><tbody>'
    +myMatches.map(m=>{
      const hn=m.homeIsMe?'<b><span class="me-star">★</span>'+myName()+'</b>':m.mandante;
      const an=!m.homeIsMe?'<b><span class="me-star">★</span>'+myName()+'</b>':m.visitante;
      const cls=m.resultado==='V'?'res-w':m.resultado==='E'?'res-d':'res-l';
      const word=m.resultado==='V'?t('win'):m.resultado==='E'?t('draw'):t('loss');
      return '<tr class="match-row"><td class="c">'+m.rodada+'</td><td>'+hn+'</td><td class="c"><b>'+m.gh+' × '+m.ga+'</b></td><td>'+an+'</td><td class="c"><span class="'+cls+'">'+word+'</span></td></tr>';
    }).join('')+'</tbody></table>';
  showResTab(0);
}
function showResTab(n){
  document.getElementById('rtab0').classList.toggle('active',n===0);
  document.getElementById('rtab1').classList.toggle('active',n===1);
  document.getElementById('resTabela').style.display=n===0?'block':'none';
  document.getElementById('resJogos').style.display=n===1?'block':'none';
}
function squadRowsHTML(){
  return S.slots.map(sl=>{
    const f=S.filled[sl.id];
    if(!f)return '';
    return '<div class="squad-row"><span class="sq-pos">'+sl.pos+'</span><span class="sq-num">#'+f.num+'</span><span class="sq-name">'+f.name+'</span><span class="sq-tag">'+f.tag+'</span><span class="sq-ovr">'+f.ovr+'</span></div>';
  }).join('');
}
function meRow(){return S.results?S.results.table.find(tm=>tm.isPlayer):null;}
function summaryCards(){
  const me=meRow();if(!me||!S.meStats)return '';
  const myPos=S.results.table.indexOf(me)+1;
  const sg=me.gp-me.gc;
  const cards=[
    [t('ovrL'),S.meStats.ovr,'blue'],[t('atkL'),S.meStats.att,''],[t('defL'),S.meStats.def,''],
    [t('formL'),S.formation,''],[t('posL'),ordinal(myPos),'blue'],[t('ptsL'),me.pts,''],
    [t('gfL'),me.gp,''],[t('gcL'),me.gc,''],[t('sgL'),(sg>0?'+':'')+sg,'']
  ];
  let html=cards.map(c=>'<div class="sum-card"><div class="sum-lbl">'+c[0]+'</div><div class="sum-val '+c[2]+'">'+c[1]+'</div></div>').join('');
  html+='<div class="sum-card" style="grid-column:1/-1;"><div class="sum-lbl">'+t('campL')+'</div><div class="sum-val small">'+t('campTxt',{j:me.j,v:me.v,e:me.e,d:me.d})+'</div></div>';
  return html;
}
function openMyTeam(){
  document.getElementById('mtTitle').innerHTML='<span class="me-star">★</span> '+myName();
  document.getElementById('mtSummary').innerHTML=summaryCards();
  document.getElementById('mtSquadLbl').textContent=t('squadTitle');
  document.getElementById('mtList').innerHTML=squadRowsHTML();
  document.getElementById('myTeamModal').classList.add('show');
}
function closeMyTeam(){document.getElementById('myTeamModal').classList.remove('show');}
function goFinal(){S.screen='screenFinal';renderFinal();showScreen('screenFinal');}
function backToTable(){S.screen='screenResults';renderResults();showScreen('screenResults');}
function renderFinal(){
  if(!S.results)return;
  const me=meRow();
  const myPos=S.results.table.indexOf(me)+1;
  const champ=S.results.table[0];
  document.getElementById('finTitle').textContent=t('finalTitle');
  document.getElementById('btnBack').textContent=t('backBtn');
  document.getElementById('finPosLabel').textContent=myName().toUpperCase()+' · '+t('finalLabel');
  document.getElementById('finPos').textContent=ordinal(myPos);
  const vars={pts:me.pts,v:me.v,e:me.e,d:me.d,champ:champ.isPlayer?myName():champ.name,cpts:champ.pts};
  let key='ph3';
  if(myPos===1)key='ph1';else if(myPos<=4)key='ph2';else if(myPos<=10)key='ph3';else if(myPos<=17)key='ph4';else key='ph5';
  document.getElementById('finSummary').textContent=t(key,vars);
  document.getElementById('finStats').innerHTML=summaryCards();
  document.getElementById('finSquadLbl').textContent=t('squadTitle');
  document.getElementById('finList').innerHTML=squadRowsHTML();
  document.getElementById('finResim').textContent=t('resim');
  document.getElementById('finNew').textContent=t('newG');
}
function resimulate(){closeMyTeam();simulate();}
function goHome(){newGame();}
function newGame(){
  S.formation=null;S.style=null;S.diff=null;S.league=null;S.filled={};S.results=null;S.usedNames=new Set();S.teamName=null;S.meStats=null;closeMyTeam();
  S.screen='screenConfig';
  updateNavStatus();
  renderConfig();showScreen('screenConfig');
}

/* ===================== NAV ===================== */
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

renderStatic();
renderConfig();
</script>
